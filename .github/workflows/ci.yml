name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python lint + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - name: Ruff (critical bug rules)
        run: ruff check --select E9,F63,F7,F82 .
      - name: Syntax check (py_compile)
        run: find . -name '*.py' -not -path './.git/*' -print0 | xargs -0 python -m py_compile

  shellcheck:
    name: ShellCheck (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find . -name '*.sh' -not -path './.git/*' -print0 | xargs -0 -r shellcheck --severity=error
